<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCT Betting Tracker</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { TrendingUp, TrendingDown, DollarSign, Target, Calendar } = lucide;

    function VCTBettingTracker() {
      const [matches, setMatches] = useState([]);
      const [bets, setBets] = useState([]);
      const [loading, setLoading] = useState(false);
      const [selectedMatch, setSelectedMatch] = useState(null);
      const [betForm, setBetForm] = useState({
        team: '',
        stake: '',
        confidence: 50,
        odds: ''
      });

      const fetchMatches = async () => {
        setLoading(true);
        try {
          const response = await fetch('https://vlrggapi.vercel.app/match?q=upcoming');
          const data = await response.json();
          
          const formattedMatches = data.data.segments.map(match => ({
            id: match.match_id || Math.random().toString(),
            team1: match.team1,
            team2: match.team2,
            date: match.time_until_match,
            event: match.tournament_name || 'VCT',
            stage: match.match_series || 'BO3'
          }));
          
          setMatches(formattedMatches);
        } catch (error) {
          console.error('Error fetching matches:', error);
          setMatches([
            {
              id: '1',
              team1: 'Team Liquid',
              team2: 'Fnatic',
              date: 'In 2 hours',
              event: 'VCT EMEA',
              stage: 'BO3'
            },
            {
              id: '2',
              team1: 'Sentinels',
              team2: 'NRG',
              date: 'Tomorrow',
              event: 'VCT Americas',
              stage: 'BO5'
            }
          ]);
        }
        setLoading(false);
      };

      useEffect(() => {
        fetchMatches();
        loadBets();
      }, []);

      const loadBets = () => {
        try {
          const stored = localStorage.getItem('vct-bets');
          if (stored) {
            setBets(JSON.parse(stored));
          }
        } catch (error) {
          console.log('No previous bets found');
        }
      };

      const saveBets = (newBets) => {
        try {
          localStorage.setItem('vct-bets', JSON.stringify(newBets));
        } catch (error) {
          console.error('Error saving bets:', error);
        }
      };

      const placeBet = () => {
        if (!selectedMatch || !betForm.team || !betForm.stake || !betForm.odds) {
          alert('Please fill in all fields');
          return;
        }

        const newBet = {
          id: Date.now().toString(),
          matchId: selectedMatch.id,
          match: `${selectedMatch.team1} vs ${selectedMatch.team2}`,
          event: selectedMatch.event,
          team: betForm.team,
          stake: parseFloat(betForm.stake),
          odds: parseFloat(betForm.odds),
          confidence: betForm.confidence,
          date: new Date().toISOString(),
          status: 'pending'
        };

        const updatedBets = [...bets, newBet];
        setBets(updatedBets);
        saveBets(updatedBets);
        
        setSelectedMatch(null);
        setBetForm({ team: '', stake: '', confidence: 50, odds: '' });
      };

      const updateBetResult = (betId, won) => {
        const updatedBets = bets.map(bet => {
          if (bet.id === betId) {
            return {
              ...bet,
              status: won ? 'won' : 'lost',
              profit: won ? (bet.stake * bet.odds) - bet.stake : -bet.stake
            };
          }
          return bet;
        });
        setBets(updatedBets);
        saveBets(updatedBets);
      };

      const stats = {
        totalBets: bets.length,
        wonBets: bets.filter(b => b.status === 'won').length,
        lostBets: bets.filter(b => b.status === 'lost').length,
        pendingBets: bets.filter(b => b.status === 'pending').length,
        totalProfit: bets.reduce((sum, b) => sum + (b.profit || 0), 0),
        totalStaked: bets.reduce((sum, b) => sum + b.stake, 0),
        winRate: bets.filter(b => b.status !== 'pending').length > 0 
          ? (bets.filter(b => b.status === 'won').length / bets.filter(b => b.status !== 'pending').length * 100).toFixed(1)
          : 0,
        roi: bets.reduce((sum, b) => sum + b.stake, 0) > 0
          ? ((bets.reduce((sum, b) => sum + (b.profit || 0), 0) / bets.reduce((sum, b) => sum + b.stake, 0)) * 100).toFixed(1)
          : 0
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-red-900 via-gray-900 to-black text-white p-6">
          <div className="max-w-7xl mx-auto">
            <h1 className="text-4xl font-bold mb-8 flex items-center gap-3">
              <Target className="text-red-500" />
              VCT Betting Tracker
            </h1>

            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="text-gray-400 text-sm mb-1">Total Bets</div>
                <div className="text-2xl font-bold">{stats.totalBets}</div>
              </div>
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="text-gray-400 text-sm mb-1">Win Rate</div>
                <div className="text-2xl font-bold text-green-400">{stats.winRate}%</div>
              </div>
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="text-gray-400 text-sm mb-1">Total Profit</div>
                <div className={`text-2xl font-bold ${stats.totalProfit >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                  ${stats.totalProfit.toFixed(2)}
                </div>
              </div>
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="text-gray-400 text-sm mb-1">ROI</div>
                <div className={`text-2xl font-bold ${stats.roi >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                  {stats.roi}%
                </div>
              </div>
            </div>

            <div className="grid md:grid-cols-2 gap-6">
              <div className="bg-gray-800 rounded-lg p-6">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-2xl font-bold">Upcoming Matches</h2>
                  <button
                    onClick={fetchMatches}
                    disabled={loading}
                    className="bg-red-600 hover:bg-red-700 px-4 py-2 rounded disabled:opacity-50"
                  >
                    {loading ? 'Loading...' : 'Refresh'}
                  </button>
                </div>
                
                <div className="space-y-3 max-h-96 overflow-y-auto">
                  {matches.map(match => (
                    <div
                      key={match.id}
                      className={`bg-gray-700 rounded p-4 cursor-pointer hover:bg-gray-600 transition ${
                        selectedMatch?.id === match.id ? 'ring-2 ring-red-500' : ''
                      }`}
                      onClick={() => setSelectedMatch(match)}
                    >
                      <div className="font-bold text-lg mb-1">
                        {match.team1} vs {match.team2}
                      </div>
                      <div className="text-sm text-gray-400">
                        {match.event} • {match.stage}
                      </div>
                      <div className="text-sm text-gray-400 flex items-center gap-1 mt-1">
                        <Calendar size={14} />
                        {match.date}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-gray-800 rounded-lg p-6">
                <h2 className="text-2xl font-bold mb-4">Place Bet</h2>
                
                {selectedMatch ? (
                  <div className="space-y-4">
                    <div className="bg-gray-700 p-3 rounded">
                      <div className="font-bold">{selectedMatch.team1} vs {selectedMatch.team2}</div>
                      <div className="text-sm text-gray-400">{selectedMatch.event}</div>
                    </div>

                    <div>
                      <label className="block text-sm mb-2">Pick Team</label>
                      <select
                        value={betForm.team}
                        onChange={(e) => setBetForm({...betForm, team: e.target.value})}
                        className="w-full bg-gray-700 rounded px-3 py-2"
                      >
                        <option value="">Select team...</option>
                        <option value={selectedMatch.team1}>{selectedMatch.team1}</option>
                        <option value={selectedMatch.team2}>{selectedMatch.team2}</option>
                      </select>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-sm mb-2">Stake ($)</label>
                        <input
                          type="number"
                          value={betForm.stake}
                          onChange={(e) => setBetForm({...betForm, stake: e.target.value})}
                          className="w-full bg-gray-700 rounded px-3 py-2"
                          placeholder="100"
                          step="0.01"
                        />
                      </div>
                      <div>
                        <label className="block text-sm mb-2">Odds</label>
                        <input
                          type="number"
                          value={betForm.odds}
                          onChange={(e) => setBetForm({...betForm, odds: e.target.value})}
                          className="w-full bg-gray-700 rounded px-3 py-2"
                          placeholder="1.85"
                          step="0.01"
                        />
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm mb-2">
                        Confidence: {betForm.confidence}%
                      </label>
                      <input
                        type="range"
                        min="0"
                        max="100"
                        value={betForm.confidence}
                        onChange={(e) => setBetForm({...betForm, confidence: parseInt(e.target.value)})}
                        className="w-full"
                      />
                      <div className="flex justify-between text-xs text-gray-400 mt-1">
                        <span>Low</span>
                        <span>Medium</span>
                        <span>High</span>
                      </div>
                    </div>

                    {betForm.stake && betForm.odds && (
                      <div className="bg-gray-700 p-3 rounded text-sm">
                        <div className="flex justify-between">
                          <span>Potential Return:</span>
                          <span className="font-bold text-green-400">
                            ${(parseFloat(betForm.stake) * parseFloat(betForm.odds)).toFixed(2)}
                          </span>
                        </div>
                        <div className="flex justify-between">
                          <span>Potential Profit:</span>
                          <span className="font-bold text-green-400">
                            ${((parseFloat(betForm.stake) * parseFloat(betForm.odds)) - parseFloat(betForm.stake)).toFixed(2)}
                          </span>
                        </div>
                      </div>
                    )}

                    <button
                      onClick={placeBet}
                      className="w-full bg-red-600 hover:bg-red-700 py-3 rounded font-bold"
                    >
                      Place Bet
                    </button>
                  </div>
                ) : (
                  <div className="text-center text-gray-400 py-12">
                    Select a match to place a bet
                  </div>
                )}
              </div>
            </div>

            <div className="bg-gray-800 rounded-lg p-6 mt-6">
              <h2 className="text-2xl font-bold mb-4">Bet History</h2>
              
              <div className="space-y-3 max-h-96 overflow-y-auto">
                {bets.length === 0 ? (
                  <div className="text-center text-gray-400 py-8">No bets placed yet</div>
                ) : (
                  [...bets].reverse().map(bet => (
                    <div key={bet.id} className="bg-gray-700 rounded p-4">
                      <div className="flex justify-between items-start mb-2">
                        <div>
                          <div className="font-bold">{bet.match}</div>
                          <div className="text-sm text-gray-400">{bet.event}</div>
                        </div>
                        <div className={`px-3 py-1 rounded text-sm font-bold ${
                          bet.status === 'won' ? 'bg-green-600' :
                          bet.status === 'lost' ? 'bg-red-600' : 'bg-yellow-600'
                        }`}>
                          {bet.status.toUpperCase()}
                        </div>
                      </div>
                      
                      <div className="grid grid-cols-2 gap-2 text-sm mb-3">
                        <div>Team: <span className="font-bold">{bet.team}</span></div>
                        <div>Stake: <span className="font-bold">${bet.stake}</span></div>
                        <div>Odds: <span className="font-bold">{bet.odds}</span></div>
                        <div>Confidence: <span className="font-bold">{bet.confidence}%</span></div>
                      </div>

                      {bet.status !== 'pending' && (
                        <div className={`text-sm font-bold ${bet.profit >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                          {bet.profit >= 0 ? '+' : ''}{bet.profit.toFixed(2)} ({bet.profit >= 0 ? '+' : ''}{((bet.profit / bet.stake) * 100).toFixed(1)}%)
                        </div>
                      )}

                      {bet.status === 'pending' && (
                        <div className="flex gap-2 mt-2">
                          <button
                            onClick={() => updateBetResult(bet.id, true)}
                            className="flex-1 bg-green-600 hover:bg-green-700 py-1 rounded text-sm"
                          >
                            Won
                          </button>
                          <button
                            onClick={() => updateBetResult(bet.id, false)}
                            className="flex-1 bg-red-600 hover:bg-red-700 py-1 rounded text-sm"
                          >
                            Lost
                          </button>
                        </div>
                      )}
                    </div>
                  ))
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<VCTBettingTracker />, document.getElementById('root'));
  </script>
</body>
</html>
